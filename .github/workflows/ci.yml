name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read    # checkout
      packages: write   # push to GHCR
      id-token: write   # OIDC token for keyless cosign signing

    steps:
      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout + Python
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Install CI tooling
        run: pip install ruff bandit pip-audit

      # ────────────────────────────────────────────────────────────────────────
      # 2. Lint
      # ────────────────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check .

      # ────────────────────────────────────────────────────────────────────────
      # 3. Tests
      # ────────────────────────────────────────────────────────────────────────
      - name: Test (pytest)
        run: pytest

      # ────────────────────────────────────────────────────────────────────────
      # 4. Bandit — static security analysis of Python source
      # ────────────────────────────────────────────────────────────────────────
      - name: Security scan (bandit)
        run: bandit -r app/

      # ────────────────────────────────────────────────────────────────────────
      # 5. pip-audit — dependency CVE check
      # ────────────────────────────────────────────────────────────────────────
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

      # ────────────────────────────────────────────────────────────────────────
      # 6. Docker image build
      # GHCR requires lowercase image names. github.repository preserves
      # the casing from the repo setting, so we normalise it here.
      # ────────────────────────────────────────────────────────────────────────
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}' | \
            tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ────────────────────────────────────────────────────────────────────────
      # 7. Trivy — image vulnerability scan
      # ignore-unfixed: only fail on vulnerabilities where a patch exists.
      # Base-image CVEs with no upstream fix are reported but don't block.
      # ────────────────────────────────────────────────────────────────────────
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # ────────────────────────────────────────────────────────────────────────
      # 8. Syft — generate CycloneDX SBOM from the image
      # The action uploads it as a workflow artifact automatically.
      # Format matches what this app's own /sboms endpoint accepts.
      # ────────────────────────────────────────────────────────────────────────
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          artifact-name: sbom-${{ github.sha }}.cdx.json
          output-file: sbom.cdx.json
          format: cyclonedx-json

      # ────────────────────────────────────────────────────────────────────────
      # 9 + 10. Push + sign — main branch only, after all gates pass
      # ────────────────────────────────────────────────────────────────────────
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
